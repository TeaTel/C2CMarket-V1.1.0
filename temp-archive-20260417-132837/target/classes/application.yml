# 主配置文件 - 使用环境变量激活不同配置
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: campus-market-backend

# 通用配置（所有环境共享）
mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.campus.backend.entity
  configuration:
    map-underscore-to-camel-case: true
    default-statement-timeout: 3000
    default-fetch-size: 100

server:
  port: ${PORT:8080}

# Swagger配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

# 应用信息
app:
  name: 校园二手交易平台
  version: 1.0.0
  description: 大学生课程期末作业项目