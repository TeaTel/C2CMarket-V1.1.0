# 开发环境配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_market_dev?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  sql:
    init:
      encoding: UTF-8
      mode: always
      schema-locations: classpath:schema-mysql.sql
      data-locations: classpath:data-mysql.sql

  # 延迟初始化，给数据库更多时间启动
  main:
    lazy-initialization: false

  # 开发环境允许跨域
  web:
    cors:
      allowed-origins: "http://localhost:3000"
      allowed-methods: "*"
      allowed-headers: "*"
      allow-credentials: true

mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.campus.backend.entity
  configuration:
    map-underscore-to-camel-case: true
    default-statement-timeout: 3000
    default-fetch-size: 100

server:
  port: 8080

# 开发环境日志级别
logging:
  level:
    com.campus.backend: DEBUG
    org.springframework.security: DEBUG