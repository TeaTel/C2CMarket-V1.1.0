# 生产环境配置
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:campus_market}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectTimeout=60000&socketTimeout=60000
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 60000  # 60秒连接超时
      validation-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      initialization-fail-timeout: 60000  # 60秒初始化失败超时
  
  sql:
    init:
      encoding: UTF-8
      mode: always
      schema-locations: classpath:schema-mysql.sql
      data-locations: classpath:data-mysql.sql
  
  # 延迟初始化，给数据库更多时间启动
  main:
    lazy-initialization: true
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: validate  # 只验证表结构，不修改
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  # 生产环境CORS配置（根据实际前端域名配置）
  web:
    cors:
      allowed-origins: "${ALLOWED_ORIGINS:http://localhost:3000,https://your-frontend-domain.vercel.app}"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      allowed-headers: "*"
      allow-credentials: true
    resources:
      static-locations: classpath:/static/
  mvc:
    static-path-pattern: /**
  
  # Redis配置 - 禁用Redis，使用内存缓存
  data:
    redis:
      enabled: false
  # 禁用Redis自动配置
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.campus.backend.entity
  configuration:
    map-underscore-to-camel-case: true
    default-statement-timeout: 3000
    default-fetch-size: 100

server:
  port: ${PORT:8080}
  # 生产环境建议启用压缩
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024

# 生产环境日志配置
logging:
  level:
    com.campus.backend: INFO
    org.springframework: WARN
  file:
    name: logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

# JWT配置（生产环境建议使用更强的密钥）
jwt:
  secret: ${JWT_SECRET:your-production-jwt-secret-key-change-this-in-production}
  expiration: 86400000 # 24小时

# 生产环境安全配置
security:
  require-ssl: false # 如果有SSL证书可以设置为true

# 生产环境Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: "health,info"
      base-path: "/actuator"
  endpoint:
    health:
      show-details: never  # 生产环境不显示详细信息
      show-components: never
      probes:
        enabled: true
      db:
        enabled: true
      diskspace:
        enabled: true
      ping:
        enabled: true
  health:
    db:
      enabled: true
    diskspace:
      enabled: true
    defaults:
      enabled: true